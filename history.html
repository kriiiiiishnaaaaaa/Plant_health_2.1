<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>History — Grow Mate AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="static/css/style.css"/>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#16a34a',secondary:'#15803d',accent:'#bbf7d0',dark:'#14532d',soft:'#f0fdf4'},fontFamily:{poppins:['Poppins','sans-serif']}}}}</script>
</head>
<body class="font-poppins bg-soft min-h-screen flex flex-col">
  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 text-primary font-bold text-xl"><span class="text-2xl">🌿</span> Grow Mate AI</a>
      <div class="hidden md:flex items-center gap-6 text-sm font-medium text-gray-600">
        <a href="index.html" class="nav-link hover:text-primary transition">Home</a>
        <a href="diagnose.html" class="nav-link hover:text-primary transition">Diagnose</a>
        <a href="buddy.html" class="nav-link hover:text-primary transition">Plant Buddy</a>
        <a href="learn.html" class="nav-link hover:text-primary transition">Learn</a>
        <a href="history.html" class="nav-link hover:text-primary transition">History</a>
      </div>
      <button id="menuBtn" class="md:hidden text-gray-600 text-2xl focus:outline-none"><i class="fas fa-bars"></i></button>
    </div>
    <div id="mobileMenu" class="hidden md:hidden bg-white border-t px-4 pb-4">
      <a href="index.html" class="block py-2 text-gray-600 hover:text-primary">Home</a>
      <a href="diagnose.html" class="block py-2 text-gray-600 hover:text-primary">Diagnose</a>
      <a href="buddy.html" class="block py-2 text-gray-600 hover:text-primary">Plant Buddy</a>
      <a href="learn.html" class="block py-2 text-gray-600 hover:text-primary">Learn</a>
      <a href="history.html" class="block py-2 text-gray-600 hover:text-primary">History</a>
    </div>
  </nav>

  <main class="flex-1">
    <div class="max-w-4xl mx-auto px-4 py-12">
      <div class="text-center mb-10">
        <h1 class="text-4xl font-extrabold text-dark mb-2">📋 Scan History</h1>
        <p class="text-gray-500">A log of all your plant health diagnoses.</p>
      </div>
      <div id="historyContent"></div>
    </div>
  </main>

  <footer class="bg-dark text-white py-8 mt-12">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-accent font-semibold text-lg mb-1">🌿 Grow Mate AI</p>
      <p class="text-green-300 text-sm">AI-powered plant health detection for everyone.</p>
      <p class="text-green-500 text-xs mt-3">© 2025 Md Irfan Alam · Usha Martin University · Diploma in CSE</p>
    </div>
  </footer>

  <script src="static/js/app.js"></script>
  <script>
    const history = JSON.parse(localStorage.getItem('gm_history') || '[]');
    const container = document.getElementById('historyContent');

    if (history.length === 0) {
      container.innerHTML = `
        <div class="bg-white rounded-3xl shadow-md border border-green-50 p-16 text-center">
          <div class="text-7xl mb-4">🌿</div>
          <h3 class="text-xl font-bold text-dark mb-2">No scans yet!</h3>
          <p class="text-gray-500 mb-6">Your scan history will appear here after you diagnose a plant.</p>
          <a href="diagnose.html" class="btn-primary px-8 py-3 rounded-full font-bold inline-block"><i class="fas fa-leaf mr-2"></i> Start Your First Scan</a>
        </div>`;
    } else {
      const healthy = history.filter(h => h.status === 'Healthy').length;
      const diseased = history.length - healthy;
      const severityColor = s => ({ None:'text-green-600', Mild:'text-yellow-600', Moderate:'text-orange-600', Severe:'text-red-600' }[s] || 'text-gray-600');
      const rows = history.map((item, i) => `
        <tr class="hover:bg-soft transition-colors">
          <td class="px-5 py-4 text-gray-400 font-medium">${i+1}</td>
          <td class="px-5 py-4 text-gray-500 whitespace-nowrap">${item.date}</td>
          <td class="px-5 py-4 font-medium text-dark">${item.plant_type}</td>
          <td class="px-5 py-4">${item.status === 'Healthy' ? '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">✅ Healthy</span>' : '<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold">⚠️ Diseased</span>'}</td>
          <td class="px-5 py-4 text-gray-600">${item.disease_name}</td>
          <td class="px-5 py-4 <span class="${severityColor(item.severity)} font-medium">${item.severity}</span></td>
          <td class="px-5 py-4 text-gray-500">${item.confidence}</td>
        </tr>`).join('');
      container.innerHTML = `
        <div class="grid grid-cols-3 gap-4 mb-8">
          <div class="bg-white rounded-2xl p-5 text-center shadow-sm border border-green-50"><p class="text-3xl font-extrabold text-dark">${history.length}</p><p class="text-xs text-gray-500 mt-1">Total Scans</p></div>
          <div class="bg-green-50 rounded-2xl p-5 text-center shadow-sm border border-green-100"><p class="text-3xl font-extrabold text-primary">${healthy}</p><p class="text-xs text-gray-500 mt-1">Healthy</p></div>
          <div class="bg-red-50 rounded-2xl p-5 text-center shadow-sm border border-red-100"><p class="text-3xl font-extrabold text-red-500">${diseased}</p><p class="text-xs text-gray-500 mt-1">Diseased</p></div>
        </div>
        <div class="bg-white rounded-3xl shadow-md border border-green-50 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-green-50 text-gray-500 text-xs uppercase tracking-wide">
                <tr>
                  <th class="px-5 py-4 text-left">#</th>
                  <th class="px-5 py-4 text-left">Date & Time</th>
                  <th class="px-5 py-4 text-left">Plant</th>
                  <th class="px-5 py-4 text-left">Status</th>
                  <th class="px-5 py-4 text-left">Disease</th>
                  <th class="px-5 py-4 text-left">Severity</th>
                  <th class="px-5 py-4 text-left">Confidence</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-50">${rows}</tbody>
            </table>
          </div>
        </div>
        <p class="text-center text-xs text-gray-400 mt-4">History is saved in your browser's local storage.</p>`;
    }
  </script>
</body>
</html>
